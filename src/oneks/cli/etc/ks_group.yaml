---
:ID:
  :desc: ONE identifier for OneKS group
  :size: 4
  :adjust: true

:USER:
  :desc: Username of the OneKS group owner
  :size: 8
  :left: true

:GROUP:
  :desc: Group of the OneKS group
  :size: 8
  :left: true

:NAME:
  :desc: Name of the OneKS group
  :size: 15
  :left: true
  :expand: true

:FLAVOUR:
  :desc: Flavour of the OneKS group
  :size: 15
  :left: true

:CLUSTER:
  :desc: Parent cluster ID of the OneKS group
  :size: 4

:ROLE:
  :desc: Role of the OneKS group
  :size: 15
  :left: true

:STATE:
  :desc: State of the OneKS group
  :size: 20
  :left: true
  :adjust: true

:REGTIME:
  :desc: Registration time of the OneKS group
  :size: 15

:default:
- :ID
- :USER
- :GROUP
- :NAME
- :ROLE
- :FLAVOUR
- :STATE
- :REGTIME
