################################################################################
# Server Configuration
################################################################################

# OpenNebula daemon contact information
:one_xmlrpc: http://localhost:2633/RPC2

# OpenNebula XML-RPC endpoint exposed through the TPROXY network.
# This endpoint is used by workloads that must reach OpenNebula through
# the cluster router, so TPROXY must be enabled in OpenNebula networking
# configuration file VAR_LOCATION/remotes/etc/vnm/OpenNebulaNetwork.conf
:one_xmlrpc_tproxy: http://169.254.16.9:2633/RPC2

# Server configuration where OneKS server will run
:server:
  :environment: production
  :bind: 127.0.0.1
  :port: 10780

# Subscribe endpoint for OpenNebula events (must match those in oned.conf)
:subscriber_endpoint: 'tcp://localhost:2101'

# Default receive timeout, in seconds, for OpenNebula event subscribers
:subscriber_timeout: 10

################################################################################
# Kubernetes Configuration
################################################################################

# Path to the kubectl binary used for Kubernetes operations
:kubectl_path: '/var/lib/rancher/rke2/bin/kubectl'

# Path to the kubeconfig file used by kubectl commands
:kubeconfig_path: '/etc/rancher/rke2/rke2.yaml'

# Timeout, in seconds, while waiting for Kubernetes command execution results
:k8s_timeout: 15

################################################################################
# Cluster Readiness Check
################################################################################

# Cluster Readiness Check configuration. Comment out this section to disable it.
# When enabled, users can run environment validation checks through OneKS.
# The check deploys the OneKS appliance from the default control plane family
# in the image datastore selected by the deployment being checked.
#   external_url       : public URL used to validate DNS resolution and outbound
#                        Internet access
#   timeout            : maximum time, in seconds, to wait for the probe VM and
#                        each check
:readiness:
  :external_url: 'https://get.rke2.io'
  :timeout: 60

################################################################################
# Defaults
################################################################################

# Default retries in case of aborting call
:retries: 5

# Default cooldown period after a scale operation, in seconds
:default_cooldown: 300

# Number of threads to make actions with clusters
# Tune this depending of the load you will have
:concurrency: 10

# Base prefix used when generating names for created resources
:base_name: 'oneks'

#############################################################
# Auth
#############################################################

# Authentication driver to communicate with OpenNebula core
#   - cipher, for symmetric cipher encryption of tokens
#   - x509, for x509 certificate encryption of tokens
:auth: opennebula
:core_auth: cipher
:expire_delta: 3600

################################################################################
# Log
################################################################################

# Log debug level
#   0 = ERROR, 1 = WARNING, 2 = INFO, 3 = DEBUG
#
# System
#   - file: log to log file
#   - syslog: log to syslog
:log:
  :level: 3
  :system: file
