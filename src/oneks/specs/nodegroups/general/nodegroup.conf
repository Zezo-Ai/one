name: "General Purpose"
description: "Nodegroup configuration for general workloads"
family: "general"
supported_k8s_versions:
  - v1.33.7
  - v1.34.2

user_inputs:
  - name: count
    description: "Number of Worker nodes"
    type: number
    mandatory: true
    match:
      type: number
      values:
        min: 0
  - name: cpu
    description: "CPU cores per Worker node"
    type: number
    mandatory: true
    default: 1
    match:
      type: number
      values:
        min: 1
  - name: vcpu
    description: "Number of VCPUs per Worker node"
    type: number
    mandatory: true
    match:
      type: number
      values:
        min: 1
  - name: memory
    description: "RAM in MB per Worker node"
    type: number
    mandatory: true
    match:
      type: number
      values:
        min: 2048
  - name: disk_size
    description: "Disk size in MB per Worker node"
    type: number
    mandatory: true
    match:
      type: number
      values:
        min: 4096

flavours:
  small:
    label: "Small Worker Nodes"
    description: |
      <p>Small worker node profile for lightweight workloads.</p>
    override_defaults: false
    defaults:
      cpu: 2
      vcpu: 2
      memory: 4096
      disk_size: 16384

  medium:
    label: "Medium Worker Nodes"
    description: |
      <p>Medium worker node profile for balanced workloads.</p>
    override_defaults: false
    defaults:
      cpu: 4
      vcpu: 4
      memory: 8192
      disk_size: 32768

  large:
    label: "Large Worker Nodes"
    description: |
      <p>Large worker node profile for demanding workloads.</p>
    override_defaults: false
    defaults:
      cpu: 8
      vcpu: 8
      memory: 16384
      disk_size: 65536

metadata:
  fireedge: