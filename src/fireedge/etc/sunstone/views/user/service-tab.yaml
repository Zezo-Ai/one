---
# This file describes the information and actions available in the Service tab

# Resource

resource_name: "SERVICE"

# Actions - Which buttons are visible to operate over the resources

actions:
  instantiate_dialog: true # reference to deploy_dialog in service-template-tab.yaml
  create_dialog: true
  recover: true
  recover_delete: true
  delete: true
  chown: false
  chgrp: false
  share: true
  unshare: true
  edit_labels: true

# Filters - List of criteria to filter the resources

filters:
  state: true
  owner: true
  group: true


# Info Tabs - Which info tabs are used to show extended information

info-tabs:

  info:
    enabled: true
    information_panel:
      enabled: true
      actions:
        rename: true
    permissions_panel:
      enabled: true
      actions:
        chmod: false
    ownership_panel:
      enabled: true
      actions:
        chown: false
        chgrp: false

  roles:
    enabled: true
    actions:
      add_role: true
      scale: true
      resume: true
      release: true
      hold: true
      suspend: true
      stop: true
      poweroff: true
      poweroff-hard: true
      reboot: true
      reboot-hard: true
      undeploy: true
      undeploy-hard: true
      terminate: true
      terminate-hard: true
      snapshot-create: true
      snapshot-revert: true
      snapshot-delete: true
      disk-snapshot-create: true
      disk-snapshot-revert: true
      disk-snapshot-delete: true

  log:
    enabled: true

  sched_actions:
    enabled: true
    actions:
      sched-add: true
      sched-update: true
      sched-delete: true

# Dialogs

dialogs:
  # update_dialog:
