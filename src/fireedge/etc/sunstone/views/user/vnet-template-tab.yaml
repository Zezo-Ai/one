---
# This file describes the information and actions available in the V. NETWORK TEMPLATE tab

# Resource

resource_name: "NETWORK-TEMPLATE"

# Actions - Which buttons are visible to operate over the resources

actions:
  create_dialog: false
  instantiate_dialog: true
  update_dialog: false
  delete: false
  chown: false
  chgrp: false
  lock: false
  unlock: false

# Filters - List of criteria to filter the resources

filters:

# Info Tabs - Which info tabs are used to show extended information

info-tabs:
  info:
    enabled: true
    information_panel:
      enabled: true
      actions:
        rename: false
    permissions_panel:
      enabled: true
      actions:
        chmod: false
    ownership_panel:
      enabled: true
      actions:
        chown: false
        chgrp: false
    qos_panel:
      enabled: true
    attributes_panel:
      enabled: true
      actions:
        copy: false
        add: false
        edit: false
        delete: false

  address:
    enabled: true
    actions:
      add_ar: false
      update_ar: false
      delete_ar: false

  security:
    enabled: false

  cluster:
    enabled: true

  template:
    enabled: true

instantiate-tabs:
  address:
    enabled: true
  security:
    enabled: true
  context:
    enabled: true
  configuration:
    enabled: true