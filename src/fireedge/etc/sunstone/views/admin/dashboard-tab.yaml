# This file configures the cards available in the dashboard for the admin view.
#
# Cards are rendered by ascending order. Supported sizes are:
# quarter, third, half, full, wide and narrow.
# The to option enables navigation for the card or its resource rows.

resource_name: 'DASHBOARD'

cards:
  - id: virtual-machines
    order: 10
    size: quarter
    to: true
  - id: hosts-summary
    order: 20
    size: quarter
    to: true
  - id: virtual-networks
    order: 30
    size: quarter
    to: true
  - id: images
    order: 40
    size: quarter
    to: true
  - id: cluster-capacity
    order: 70
    size: wide
    to: false
  - id: system
    order: 80
    size: narrow
    to: true
