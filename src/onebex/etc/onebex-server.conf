################################################################################
# Server Configuration
################################################################################

# Host and port where OneBEX server will run
:host: 0.0.0.0
:port: 13014

# Server shutdown timing, in seconds.
#
# shutdown_delay
#   Delay after the final /vms/:VM_ID/finish request before stopping
#   the OneBEX server.
#
# idle_timeout
#   Maximum time without receiving any HTTP request before the OneBEX server
#   stops automatically.
#
# onebex_timeout
#   Maximum time, in seconds, that interactive backups wait for the
#   OneBEX export to finish after it has started.
:shutdown_delay: 2
:idle_timeout: 300
:onebex_timeout: 1800

################################################################################
# Log
################################################################################

# Log debug level
#   0 = ERROR, 1 = WARNING, 2 = INFO, 3 = DEBUG
#
# System
#   - file: log to log file
#   - syslog: log to syslog
:log:
  :level: 2
  :system: file

################################################################################
# Puma
################################################################################

# Puma thread pool limits for concurrent OneBEX HTTP requests.
:puma:
  :min_threads: 1
  :max_threads: 4
